services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dom_traversal_backend
    ports:
      - "8080:8080"
    networks:
      - dom_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dom_traversal_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - dom_network
    restart: unless-stopped

networks:
  dom_network:
    driver: bridge